<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Platform Fighter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <!-- Main Menu -->
        <div id="main-menu" class="screen active">
            <h1>Pixel Fighter</h1>
            <div class="host-section" style="margin-bottom: 20px;">
                <div style="margin-bottom: 10px;">
                    <label for="game-mode" style="font-size: 12px;">Mode:</label>
                    <select id="game-mode" style="font-family: var(--font-pixel); padding: 5px; background: #333; color: white; border: 2px solid white;">
                        <option value="1v1">1 vs 1</option>
                        <option value="deathmatch">Deathmatch</option>
                    </select>
                </div>
                <div id="players-count-container" style="display: none; margin-bottom: 10px;">
                    <label for="max-players" style="font-size: 12px;">Players:</label>
                    <input type="number" id="max-players" min="3" max="4" value="3" style="width: 50px; padding: 5px;">
                </div>
                <button id="btn-host">Host Game</button>
            </div>
            <div class="join-section">
                <input type="text" id="input-room-code" placeholder="4-Digit Code" maxlength="4">
                <button id="btn-join">Join Game</button>
            </div>
            <p id="menu-message"></p>
        </div>

        <!-- Lobby (Host waiting) -->
        <div id="lobby-screen" class="screen">
            <h2>Room Code: <span id="display-room-code">----</span></h2>
            <p id="lobby-waiting-text">Waiting for Player 2...</p>
        </div>

        <!-- Character Select -->
        <div id="character-select" class="screen">
            <h2>Select Your Character</h2>
            <div class="character-list">
                <p>Loading characters...</p>
            </div>
            <p id="select-message">Waiting for opponents...</p>
        </div>

        <!-- Game HUD -->
        <div id="game-hud" class="screen">
            <div id="hud-container" style="display: flex; justify-content: space-between; width: 100%; padding: 10px; box-sizing: border-box; flex-wrap: wrap;">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <h1 id="game-over-title">Game Over</h1>
            <button id="btn-game-over-ok">OK</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script src="game.js"></script>
</body>
</html>
