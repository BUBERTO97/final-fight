<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Platform Fighter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui-container">
        <!-- Orientation Overlay -->
        <div id="orientation-overlay" class="screen">
            <h2>Please Rotate Your Device</h2>
            <p>This game is best played in Landscape mode.</p>
        </div>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1>Pixel Fighter</h1>
            <button id="btn-start-game">Click to Start</button>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen">
            <h1>Pixel Fighter</h1>
            <div class="host-section">
                <div class="input-group">
                    <label for="game-mode">Mode:</label>
                    <select id="game-mode">
                        <option value="1v1">1 vs 1</option>
                        <option value="deathmatch">Deathmatch</option>
                    </select>
                </div>
                <div id="players-count-container" class="input-group" style="display: none;">
                    <label for="max-players">Players:</label>
                    <input type="number" id="max-players" min="3" max="4" value="3">
                </div>
                <button id="btn-host">Host Game</button>
            </div>
            <div class="join-section">
                <input type="text" id="input-room-code" placeholder="4-Digit Code" maxlength="4">
                <button id="btn-join">Join Game</button>
            </div>
            <button id="btn-fullscreen" style="display: none; margin-top: 20px; background: #555; font-size: 10px;">Fullscreen</button>
            <p id="menu-message"></p>
        </div>

        <!-- Lobby (Host waiting) -->
        <div id="lobby-screen" class="screen">
            <h2>Room Code: <span id="display-room-code">----</span></h2>
            <p id="lobby-waiting-text">Waiting for Player 2...</p>
        </div>

        <!-- Character Select -->
        <div id="character-select" class="screen">
            <h2>Select Your Character</h2>
            <div class="character-list">
                <p>Loading characters...</p>
            </div>
            <p id="select-message">Waiting for opponents...</p>
        </div>

        <!-- Game HUD -->
        <div id="game-hud" class="screen">
            <div id="hud-container">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen">
            <h1 id="game-over-title">Game Over</h1>
            <button id="btn-game-over-ok">OK</button>
        </div>
    </div>

    <div id="mobile-controls" style="display: none;">
        <div class="dpad">
            <button id="ctrl-up" class="ctrl-btn">▲</button>
            <div class="dpad-mid">
                <button id="ctrl-left" class="ctrl-btn">◀</button>
                <button id="ctrl-right" class="ctrl-btn">▶</button>
            </div>
            <button id="ctrl-down" class="ctrl-btn">▼</button>
        </div>
        <div class="actions">
            <button id="ctrl-ult" class="ctrl-btn ult">U</button>
            <button id="ctrl-attack" class="ctrl-btn attack">A</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script src="game.js"></script>
</body>
</html>
