<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pixel Platform Fighter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <div id="ui-container">
        <!-- Orientation Overlay -->
        <div id="orientation-overlay" class="screen">
            <h2>Please Rotate Your Device</h2>
            <p>This game is best played in Landscape mode.</p>
        </div>

        <!-- Hidden inputs for mapping keyboard to WebGL UI -->
        <input type="text" id="hidden-room-code" maxlength="4" style="position:absolute; opacity:0; pointer-events:none;">
        <input type="text" id="hidden-player-name" maxlength="12" style="position:absolute; opacity:0; pointer-events:none;">
    </div>

    <!-- Mobile Controls from before, we might still want to capture their events overlayed, or redo them in WebGL -->
    <!-- It's actually better to keep the touch layout and map it, but the user requested "menu and other interactions" to use TreeJS -->
    <!-- So we'll try raycasting on screen for the dpad, but mapping it from HTML is significantly more performant and reliable for multi-touch. 
         Let's keep DOM for mobile controller overlay since it's an invisible/semi-transparent control surface, but we can do WebGL too.
         I'll keep mobile-controls for now to preserve touch multi-tap reliability, as it's hard in a single WebGL canvas doing manual multi-touch tracking. -->
    <div id="mobile-controls" style="display: none;">
        <div class="dpad">
            <button id="ctrl-up" class="ctrl-btn">▲</button>
            <div class="dpad-mid">
                <button id="ctrl-left" class="ctrl-btn">◀</button>
                <button id="ctrl-right" class="ctrl-btn">▶</button>
            </div>
        </div>
        <div class="actions">
            <button id="ctrl-ult" class="ctrl-btn ult">U</button>
            <button id="ctrl-attack" class="ctrl-btn attack">A</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module" src="game.js"></script>
</body>

</html>
